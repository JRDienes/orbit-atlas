<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 210" role="img" aria-label="AST SpaceMobile BlueBird satellite HUD wireframe schematic">
  <!-- Iron Man / JARVIS-style HUD schematic of an AST SpaceMobile BlueBird in 3/4
       iso view. Its defining feature is one enormous flat phased-array panel
       (direct-to-cell), heavily tiled — visually distinct from solar-wing craft.
       All strokes use currentColor so the schematic inherits the category accent
       (AST purple). -->
  <defs>
    <filter id="bglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bvignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.10"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="360" height="210" fill="url(#bvignette)"/>

  <!-- faint scan lines -->
  <g stroke="currentColor" stroke-width="0.5" stroke-opacity="0.07">
    <line x1="0" y1="40"  x2="360" y2="40"/>
    <line x1="0" y1="80"  x2="360" y2="80"/>
    <line x1="0" y1="120" x2="360" y2="120"/>
    <line x1="0" y1="160" x2="360" y2="160"/>
  </g>

  <!-- scan reticle behind the craft -->
  <g stroke="currentColor" fill="none" stroke-opacity="0.20">
    <circle cx="175" cy="110" r="104" stroke-width="0.8" stroke-dasharray="2 6"/>
    <circle cx="175" cy="110" r="74" stroke-width="0.6" stroke-dasharray="1 9"/>
  </g>

  <!-- ============ SATELLITE (iso wireframe) ============ -->
  <g filter="url(#bglow)">
    <!-- big phased-array panel (faint fill) -->
    <polygon points="110,170 280,130 240,50 70,90" fill="currentColor" fill-opacity="0.07"
             stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- array cell grid -->
    <g stroke="currentColor" stroke-width="0.6" stroke-opacity="0.5">
      <!-- lines across (parallel to top/bottom edges) -->
      <line x1="104" y1="159" x2="274" y2="119"/>
      <line x1="99"  y1="147" x2="269" y2="107"/>
      <line x1="93"  y1="136" x2="263" y2="96"/>
      <line x1="87"  y1="124" x2="257" y2="84"/>
      <line x1="81"  y1="113" x2="251" y2="73"/>
      <line x1="76"  y1="101" x2="246" y2="61"/>
      <!-- lines down (parallel to side edges) -->
      <line x1="134" y1="164" x2="94"  y2="84"/>
      <line x1="159" y1="159" x2="119" y2="79"/>
      <line x1="183" y1="153" x2="143" y2="73"/>
      <line x1="207" y1="147" x2="167" y2="67"/>
      <line x1="231" y1="141" x2="191" y2="61"/>
      <line x1="256" y1="136" x2="216" y2="56"/>
    </g>
    <!-- panel sheen along the near edge -->
    <polygon points="110,170 280,130 277,121 107,161" fill="currentColor" fill-opacity="0.10"/>

    <!-- small satellite bus module at the near corner -->
    <g stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" fill="currentColor" fill-opacity="0.06">
      <polygon points="92,176 122,176 134,169 104,169"/>          <!-- top face -->
      <polygon points="92,176 122,176 122,194 92,194"/>            <!-- front face -->
      <polygon points="122,176 134,169 134,187 122,194"/>          <!-- right face -->
    </g>
  </g>

  <!-- ============ HUD OVERLAY ============ -->
  <!-- corner brackets -->
  <g stroke="currentColor" stroke-width="1.3" fill="none" stroke-opacity="0.85">
    <polyline points="12,26 12,12 26,12"/>
    <polyline points="334,12 348,12 348,26"/>
    <polyline points="12,184 12,198 26,198"/>
    <polyline points="334,198 348,198 348,184"/>
  </g>

  <!-- title block -->
  <g fill="currentColor" font-family="'Courier New', monospace">
    <text x="20" y="28" font-size="9" letter-spacing="2" font-weight="bold">BLUEBIRD</text>
    <text x="20" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">AST SPACEMOBILE · SCHEMATIC</text>
  </g>
  <g fill="currentColor" font-family="'Courier New', monospace" text-anchor="end">
    <text x="340" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">LEO · DIRECT-TO-CELL</text>
  </g>

  <!-- callouts with leader lines -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.6" fill="currentColor"
     font-family="'Courier New', monospace" font-size="6.5" letter-spacing="1.5">
    <!-- giant phased array -->
    <line x1="228" y1="78" x2="290" y2="60"/>
    <circle cx="228" cy="78" r="1.4" stroke="none"/>
    <text x="294" y="63" stroke="none" fill-opacity="0.85" text-anchor="end">PHASED-ARRAY</text>
    <text x="294" y="72" stroke="none" fill-opacity="0.6" text-anchor="end">(DIRECT-TO-CELL)</text>
    <!-- bus -->
    <line x1="106" y1="186" x2="48" y2="196"/>
    <circle cx="106" cy="186" r="1.4" stroke="none"/>
    <text x="44" y="199" stroke="none" fill-opacity="0.85" text-anchor="end">SATELLITE BUS</text>
  </g>
</svg>
