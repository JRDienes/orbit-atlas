<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 210" role="img" aria-label="Starlink V2 Mini HUD wireframe schematic">
  <!-- Iron Man / JARVIS-style HUD schematic of a Starlink V2 Mini in 3/4 iso view.
       All strokes use currentColor so the whole schematic inherits the selected
       category accent color (Starlink cyan, US blue, China red, ...). -->
  <defs>
    <filter id="hudglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0"   stop-color="currentColor" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="360" height="210" fill="url(#vignette)"/>

  <!-- faint scan lines -->
  <g stroke="currentColor" stroke-width="0.5" stroke-opacity="0.07">
    <line x1="0" y1="40"  x2="360" y2="40"/>
    <line x1="0" y1="80"  x2="360" y2="80"/>
    <line x1="0" y1="120" x2="360" y2="120"/>
    <line x1="0" y1="160" x2="360" y2="160"/>
  </g>

  <!-- scan reticle behind the craft -->
  <g stroke="currentColor" fill="none" stroke-opacity="0.20">
    <circle cx="184" cy="116" r="98" stroke-width="0.8" stroke-dasharray="2 6"/>
    <circle cx="184" cy="116" r="70" stroke-width="0.6" stroke-dasharray="1 9"/>
    <g stroke-width="0.8" stroke-opacity="0.30">
      <line x1="184" y1="12" x2="184" y2="26"/>
      <line x1="184" y1="206" x2="184" y2="192"/>
      <line x1="82"  y1="116" x2="96"  y2="116"/>
      <line x1="286" y1="116" x2="272" y2="116"/>
    </g>
  </g>

  <!-- ============ SATELLITE (iso wireframe) ============ -->
  <g filter="url(#hudglow)">
    <!-- left + right solar wing top faces (faint fill, gridded) -->
    <g fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round">
      <polygon points="36,130 150,130 176,115 62,115"/>
      <polygon points="192,130 316,130 342,115 218,115"/>
    </g>
    <!-- wing cell grid -->
    <g stroke="currentColor" stroke-width="0.6" stroke-opacity="0.55">
      <line x1="55"  y1="130" x2="81"  y2="115"/>
      <line x1="74"  y1="130" x2="100" y2="115"/>
      <line x1="93"  y1="130" x2="119" y2="115"/>
      <line x1="112" y1="130" x2="138" y2="115"/>
      <line x1="131" y1="130" x2="157" y2="115"/>
      <line x1="49"  y1="122.5" x2="163" y2="122.5"/>
      <line x1="213" y1="130" x2="239" y2="115"/>
      <line x1="233" y1="130" x2="259" y2="115"/>
      <line x1="254" y1="130" x2="280" y2="115"/>
      <line x1="275" y1="130" x2="301" y2="115"/>
      <line x1="295" y1="130" x2="321" y2="115"/>
      <line x1="205" y1="122.5" x2="329" y2="122.5"/>
    </g>

    <!-- bus: right face, top face, front face -->
    <g fill="currentColor" fill-opacity="0.05" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round">
      <polygon points="192,130 218,115 218,81 192,96"/>            <!-- right face -->
      <polygon points="150,96 192,96 218,81 176,81"/>              <!-- top face -->
      <polygon points="150,130 192,130 192,96 150,96"/>            <!-- front face -->
    </g>
    <!-- phased-array antenna on front face -->
    <g stroke="currentColor" stroke-width="0.7" stroke-opacity="0.7" fill="currentColor" fill-opacity="0.08">
      <rect x="156" y="104" width="30" height="20"/>
      <line x1="156" y1="111" x2="186" y2="111"/>
      <line x1="156" y1="117.5" x2="186" y2="117.5"/>
      <line x1="166" y1="104" x2="166" y2="124"/>
      <line x1="176" y1="104" x2="176" y2="124"/>
    </g>
  </g>

  <!-- ============ HUD OVERLAY ============ -->
  <!-- corner brackets -->
  <g stroke="currentColor" stroke-width="1.3" fill="none" stroke-opacity="0.85">
    <polyline points="12,26 12,12 26,12"/>
    <polyline points="334,12 348,12 348,26"/>
    <polyline points="12,184 12,198 26,198"/>
    <polyline points="334,198 348,198 348,184"/>
  </g>

  <!-- title block -->
  <g fill="currentColor" font-family="'Courier New', monospace">
    <text x="20" y="28" font-size="9" letter-spacing="2" font-weight="bold">STARLINK V2 MINI</text>
    <text x="20" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">GEN 2 · SCHEMATIC</text>
  </g>
  <g fill="currentColor" font-family="'Courier New', monospace" text-anchor="end">
    <text x="340" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">LEO · ~550 KM</text>
  </g>

  <!-- callouts with leader lines -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.6" fill="currentColor"
     font-family="'Courier New', monospace" font-size="6.5" letter-spacing="1.5">
    <!-- solar array -->
    <line x1="88" y1="105" x2="88" y2="70"/>
    <circle cx="88" cy="105" r="1.4" stroke="none"/>
    <text x="84" y="64" stroke="none" fill-opacity="0.85">SOLAR ARRAY</text>
    <!-- phased array -->
    <line x1="186" y1="114" x2="250" y2="150"/>
    <circle cx="186" cy="114" r="1.4" stroke="none"/>
    <text x="254" y="153" stroke="none" fill-opacity="0.85">PHASED-ARRAY ANTENNA</text>
    <!-- bus -->
    <line x1="200" y1="90" x2="240" y2="66"/>
    <circle cx="200" cy="90" r="1.4" stroke="none"/>
    <text x="244" y="69" stroke="none" fill-opacity="0.85">SATELLITE BUS</text>
  </g>

  <!-- wingspan dimension bracket (no figure — technical framing only) -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.5" fill="currentColor"
     font-family="'Courier New', monospace" font-size="6" letter-spacing="2">
    <line x1="36" y1="170" x2="316" y2="170"/>
    <line x1="36" y1="166" x2="36" y2="174"/>
    <line x1="316" y1="166" x2="316" y2="174"/>
    <polygon points="36,170 43,167 43,173" stroke="none" fill-opacity="0.6"/>
    <polygon points="316,170 309,167 309,173" stroke="none" fill-opacity="0.6"/>
    <rect x="150" y="164" width="52" height="12" fill="#020818"/>
    <text x="176" y="172.5" text-anchor="middle" stroke="none" fill-opacity="0.8">PV ARRAY SPAN</text>
  </g>
</svg>
