<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 210" role="img" aria-label="Amazon Kuiper satellite HUD wireframe schematic">
  <!-- Iron Man / JARVIS-style HUD schematic of an Amazon Kuiper satellite in 3/4
       iso view. Single large solar wing (asymmetric) distinguishes it from the
       twin-wing Starlink V2. All strokes use currentColor so the schematic
       inherits the category accent (Amazon orange). -->
  <defs>
    <filter id="kglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="kvignette" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.10"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="360" height="210" fill="url(#kvignette)"/>

  <!-- faint scan lines -->
  <g stroke="currentColor" stroke-width="0.5" stroke-opacity="0.07">
    <line x1="0" y1="40"  x2="360" y2="40"/>
    <line x1="0" y1="80"  x2="360" y2="80"/>
    <line x1="0" y1="120" x2="360" y2="120"/>
    <line x1="0" y1="160" x2="360" y2="160"/>
  </g>

  <!-- scan reticle behind the craft -->
  <g stroke="currentColor" fill="none" stroke-opacity="0.20">
    <circle cx="200" cy="112" r="96" stroke-width="0.8" stroke-dasharray="2 6"/>
    <circle cx="200" cy="112" r="68" stroke-width="0.6" stroke-dasharray="1 9"/>
    <g stroke-width="0.8" stroke-opacity="0.30">
      <line x1="200" y1="10" x2="200" y2="24"/>
      <line x1="200" y1="204" x2="200" y2="190"/>
      <line x1="100" y1="112" x2="114" y2="112"/>
      <line x1="300" y1="112" x2="286" y2="112"/>
    </g>
  </g>

  <!-- ============ SATELLITE (iso wireframe) ============ -->
  <g filter="url(#kglow)">
    <!-- single solar wing (right), faint fill + cell grid -->
    <g fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round">
      <polygon points="120,128 322,128 348,113 146,113"/>
    </g>
    <g stroke="currentColor" stroke-width="0.6" stroke-opacity="0.55">
      <line x1="145" y1="128" x2="171" y2="113"/>
      <line x1="170" y1="128" x2="196" y2="113"/>
      <line x1="196" y1="128" x2="222" y2="113"/>
      <line x1="221" y1="128" x2="247" y2="113"/>
      <line x1="246" y1="128" x2="272" y2="113"/>
      <line x1="271" y1="128" x2="297" y2="113"/>
      <line x1="297" y1="128" x2="323" y2="113"/>
      <line x1="129" y1="123" x2="331" y2="123"/>
      <line x1="137" y1="118" x2="339" y2="118"/>
    </g>
    <!-- top sheen on the wing -->
    <polygon points="120,128 322,128 327,125 125,125" fill="currentColor" fill-opacity="0.10"/>

    <!-- boom connecting bus to wing -->
    <rect x="102" y="104" width="18" height="6" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="0.7"/>

    <!-- bus: right face, top face, front face -->
    <g fill="currentColor" fill-opacity="0.05" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round">
      <polygon points="102,134 128,119 128,77 102,92"/>            <!-- right face -->
      <polygon points="60,92 102,92 128,77 86,77"/>                <!-- top face -->
      <polygon points="60,134 102,134 102,92 60,92"/>              <!-- front face -->
    </g>
    <!-- phased-array antenna on front face -->
    <g stroke="currentColor" stroke-width="0.7" stroke-opacity="0.7" fill="currentColor" fill-opacity="0.08">
      <rect x="66" y="100" width="30" height="28"/>
      <line x1="66" y1="109.3" x2="96" y2="109.3"/>
      <line x1="66" y1="118.6" x2="96" y2="118.6"/>
      <line x1="76" y1="100" x2="76" y2="128"/>
      <line x1="86" y1="100" x2="86" y2="128"/>
    </g>
  </g>

  <!-- ============ HUD OVERLAY ============ -->
  <!-- corner brackets -->
  <g stroke="currentColor" stroke-width="1.3" fill="none" stroke-opacity="0.85">
    <polyline points="12,26 12,12 26,12"/>
    <polyline points="334,12 348,12 348,26"/>
    <polyline points="12,184 12,198 26,198"/>
    <polyline points="334,198 348,198 348,184"/>
  </g>

  <!-- title block -->
  <g fill="currentColor" font-family="'Courier New', monospace">
    <text x="20" y="28" font-size="9" letter-spacing="2" font-weight="bold">KUIPER</text>
    <text x="20" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">AMAZON · SCHEMATIC</text>
  </g>
  <g fill="currentColor" font-family="'Courier New', monospace" text-anchor="end">
    <text x="340" y="40" font-size="6.5" letter-spacing="2" fill-opacity="0.7">LEO · ~600 KM</text>
  </g>

  <!-- callouts with leader lines -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.6" fill="currentColor"
     font-family="'Courier New', monospace" font-size="6.5" letter-spacing="1.5">
    <!-- solar array (single) -->
    <line x1="238" y1="120" x2="238" y2="66"/>
    <circle cx="238" cy="120" r="1.4" stroke="none"/>
    <text x="234" y="60" stroke="none" fill-opacity="0.85">SOLAR ARRAY (1×)</text>
    <!-- phased array -->
    <line x1="84" y1="124" x2="40" y2="158"/>
    <circle cx="84" cy="124" r="1.4" stroke="none"/>
    <text x="36" y="168" stroke="none" fill-opacity="0.85" text-anchor="end">PHASED-ARRAY ANTENNA</text>
    <!-- bus -->
    <line x1="108" y1="86" x2="148" y2="64"/>
    <circle cx="108" cy="86" r="1.4" stroke="none"/>
    <text x="152" y="67" stroke="none" fill-opacity="0.85">SATELLITE BUS</text>
  </g>

  <!-- array-span dimension bracket -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.5" fill="currentColor"
     font-family="'Courier New', monospace" font-size="6" letter-spacing="2">
    <line x1="120" y1="184" x2="322" y2="184"/>
    <line x1="120" y1="180" x2="120" y2="188"/>
    <line x1="322" y1="180" x2="322" y2="188"/>
    <polygon points="120,184 127,181 127,187" stroke="none" fill-opacity="0.6"/>
    <polygon points="322,184 315,181 315,187" stroke="none" fill-opacity="0.6"/>
    <rect x="196" y="178" width="50" height="12" fill="#020818"/>
    <text x="221" y="186.5" text-anchor="middle" stroke="none" fill-opacity="0.8">ARRAY SPAN</text>
  </g>
</svg>
